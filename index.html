<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerGuide | 會員攻略發布系統 (含搜尋功能)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; }
        header { background-color: #1f1f1f; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ffcc00; }
        h1 { color: #ffcc00; margin: 0; font-size: 24px; }
        
        /* 登入狀態按鈕 */
        .auth-panel { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffcc00; display: none; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .login-btn { background-color: #4285F4; color: white; }
        .logout-btn { background-color: #d9534f; color: white; display: none; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        /* 發文表單 */
        .post-box { background-color: #1f1f1f; padding: 25px; border-radius: 8px; margin-bottom: 40px; display: none; }
        .login-reminder { background-color: #222; text-align: center; padding: 30px; border-radius: 8px; border: 1px dashed #ffcc00; color: #aaa; margin-bottom: 40px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; box-sizing: border-box; background-color: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .submit-btn { background-color: #ffcc00; color: #121212; font-size: 16px; font-weight: bold; width: 100%; }

        /* 新增：搜尋區塊樣式 */
        .search-box { background-color: #1f1f1f; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .search-box label { font-weight: bold; color: #ffcc00; white-space: nowrap; }
        .search-box input { flex: 1; padding: 10px; background-color: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; }

        /* 文章列表 */
        .guide-post { background-color: #1f1f1f; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; border-left: 4px solid #ffcc00; }
        .guide-post h3 { margin: 0 0 10px 0; color: #fff; }
        .meta { font-size: 13px; color: #888; margin-bottom: 15px; }
        .meta span { margin-right: 15px; background: #333; padding: 3px 8px; border-radius: 4px; }
        .post-content { white-space: pre-wrap; margin-bottom: 20px; }
        
        /* 影片可視化小窗口樣式 */
        .video-wrapper { max-width: 480px; margin: 15px 0 20px 0; border-radius: 6px; overflow: hidden; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .post-video { width: 100%; height: 270px; display: block; border: none; }

        /* 功能按鈕組 */
        .action-group { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .edit-btn { background-color: #5cb85c; color: white; display: none; }
        .delete-btn { background-color: #d9534f; color: white; display: none; }
    </style>
</head>
<body>

    <header>
        <h1>GamerGuide 玩家創作區</h1>
        <div class="auth-panel">
            <img id="userAvatar" class="user-avatar" src="" alt="頭像">
            <span id="userName" style="display:none;"></span>
            <button id="loginBtn" class="btn login-btn">使用 Google 登入</button>
            <button id="logoutBtn" class="btn logout-btn">登出</button>
        </div>
    </header>

    <div class="container">
        <div id="loginReminder" class="login-reminder">
            <h3>請先登入 Google 帳號，即可發表或編輯攻略文章！</h3>
        </div>

        <section id="postBox" class="post-box">
            <h2 id="formTitle">📝 撰寫新攻略</h2>
            <form id="guideForm">
                <input type="hidden" id="editingPostId"> 
                
                <div class="form-group">
                    <label for="gameName">遊戲名稱：</label>
                    <input type="text" id="gameName" required>
                </div>
                <div class="form-group">
                    <label for="title">攻略標題：</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="content">攻略內容：</label>
                    <textarea id="content" required></textarea>
                </div>
                <div class="form-group">
                    <label for="videoUrl">影片網址連結 (選填)：</label>
                    <input type="url" id="videoUrl" placeholder="請貼上影片連結 (支援 MP4、WebM 或 YouTube 網址)">
                </div>

                <button type="submit" id="formSubmitBtn" class="btn submit-btn">發布攻略</button>
                <button type="button" id="cancelEditBtn" class="btn" style="background:#555; color:#fff; width:100%; margin-top:10px; display:none;">取消編輯</button>
            </form>
        </section>

        <section class="article-feed">
            <div class="search-box">
                <label for="searchGame">🔍 搜尋遊戲：</label>
                <input type="text" id="searchGame" placeholder="輸入遊戲名稱關鍵字...">
            </div>

            <h2>🔥 最新玩家攻略</h2>
            <div id="postsContainer"></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC1f_sypRrrpUKym4VdySlriFb_WGP64s0",
            authDomain: "project-78ab8.firebaseapp.com",
            projectId: "project-78ab8",
            storageBucket: "project-78ab8.firebasestorage.app",
            messagingSenderId: "385214699225",
            appId: "1:385214699225:web:2150c4809616e6321490c8",
            measurementId: "G-62ZWJ9JLJD"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null; 
        let allPosts = []; // 新增：用來暫存從雲端同步下來的所有攻略資料

        // === 1. 登入/登出邏輯 (純彈窗模式) ===
        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => console.error("彈窗登入失敗:", err));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('loginReminder').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('userAvatar').src = user.photoURL;
                document.getElementById('userAvatar').style.display = 'block';
                document.getElementById('postBox').style.display = 'block';
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('loginReminder').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'none';
                document.getElementById('userAvatar').style.display = 'none';
                document.getElementById('postBox').style.display = 'none';
                resetForm();
            }
            // 狀態切換時重新渲染列表（確保編輯/刪除按鈕顯示正確）
            renderPosts(); 
        });

        // 影片連結解析輔助函式
        function formatVideoEmbed(url) {
            if (!url) return '';
            const youtubeRegex = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(youtubeRegex);
            
            if (match && match[2].length === 11) {
                const youtubeId = match[2];
                return `<div class="video-wrapper"><iframe class="post-video" src="https://www.youtube.com/embed/${youtubeId}" allowfullscreen></iframe></div>`;
            } else {
                return `<div class="video-wrapper"><video class="post-video" src="${url}" controls preload="metadata"></video></div>`;
            }
        }

        // === 2. 發布或儲存編輯攻略 ===
        const form = document.getElementById('guideForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return alert('請先登入！');

            const gameName = document.getElementById('gameName').value.trim();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value;
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const editingId = document.getElementById('editingPostId').value;

            try {
                if (editingId) {
                    const postRef = doc(db, "guides", editingId);
                    await updateDoc(postRef, { gameName, title, content, videoUrl });
                    alert('📝 攻略修改成功！');
                    resetForm();
                } else {
                    await addDoc(collection(db, "guides"), {
                        gameName, title, content, videoUrl,
                        userId: currentUser.uid, 
                        author: currentUser.displayName,
                        timestamp: new Date()
                    });
                    alert('🎉 攻略發表成功！');
                    resetForm();
                }
            } catch (error) {
                console.error(error);
                alert('操作失敗，請檢查權限或網路狀態。');
            }
        });

        // === 3. 即時同步下載資料與渲染 (整合搜尋邏輯) ===
        function initPostsListener() {
            const q = query(collection(db, "guides"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                allPosts = []; // 清空暫存
                snapshot.forEach((doc) => {
                    allPosts.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                renderPosts(); // 取得新資料後執行渲染
            });
        }

        // 獨立出的渲染函式：負責過濾搜尋字串並畫出 HTML
        function renderPosts() {
            const postsContainer = document.getElementById('postsContainer');
            postsContainer.innerHTML = ''; 

            // 取得搜尋框內的文字（並轉小寫，實現不分大小寫搜尋）
            const keyword = document.getElementById('searchGame').value.toLowerCase().trim();

            // 篩選出遊戲名稱符合關鍵字的貼文
            const filteredPosts = allPosts.filter(post => {
                const gameName = post.gameName ? post.gameName.toLowerCase() : '';
                return gameName.includes(keyword);
            });

            if (filteredPosts.length === 0) {
                postsContainer.innerHTML = `<p style="color: #888; text-align: center; margin-top: 20px;">找不到符合該遊戲名稱的攻略 😭</p>`;
                return;
            }

            filteredPosts.forEach((data) => {
                const postEl = document.createElement('article');
                postEl.classList.add('guide-post');
                
                const showBtn = currentUser && currentUser.uid === data.userId ? 'inline-block' : 'none';
                const videoHtml = formatVideoEmbed(data.videoUrl);

                postEl.innerHTML = `
                    <h3>${data.title}</h3>
                    <div class="meta">
                        <span>遊戲：${data.gameName}</span> 
                        <span>作者：${data.author}</span> 
                    </div>
                    <p class="post-content">${data.content}</p>
                    ${videoHtml}
                    <div class="action-group">
                        <button class="btn edit-btn" style="display:${showBtn}" data-id="${data.id}">編輯</button>
                        <button class="btn delete-btn" style="display:${showBtn}" data-id="${data.id}">刪除</button>
                    </div>
                `;
                postsContainer.appendChild(postEl);
            });

            // 重新綁定事件
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => startEdit(e.target.getAttribute('data-id')));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => handleDelete(e.target.getAttribute('data-id')));
            });
        }

        // 監聽搜尋輸入框：當使用者打字時，即時觸發過濾重新渲染
        document.getElementById('searchGame').addEventListener('input', renderPosts);

        // === 4. 編輯與刪除細節控制 ===
        function startEdit(id) {
            // 從快取的 allPosts 中直接找出對應的貼文資料，更精準安全
            const postData = allPosts.find(p => p.id === id);
            if (!postData) return;
            
            document.getElementById('gameName').value = postData.gameName || '';
            document.getElementById('title').value = postData.title || '';
            document.getElementById('content').value = postData.content || '';
            document.getElementById('videoUrl').value = postData.videoUrl || '';

            document.getElementById('editingPostId').value = id;
            document.getElementById('formTitle').textContent = "✏️ 編輯我的攻略";
            document.getElementById('formSubmitBtn').textContent = "儲存修改";
            document.getElementById('cancelEditBtn').style.display = "block";
            
            window.scrollTo({ top: document.getElementById('postBox').offsetTop, behavior: 'smooth' });
        }

        async function handleDelete(id) {
            if (confirm('確定要刪除這篇攻略嗎？此操作無法復原。')) {
                try {
                    await deleteDoc(doc(db, "guides", id));
                    alert('🗑️ 攻略已成功刪除！');
                    if(document.getElementById('editingPostId').value === id) {
                        resetForm();
                    }
                } catch (error) {
                    console.error(error);
                    alert('刪除失敗，請確認您的權限。');
                }
            }
        }

        document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

        function resetForm() {
            form.reset();
            document.getElementById('editingPostId').value = '';
            document.getElementById('formTitle').textContent = "📝 撰寫新攻略";
            document.getElementById('formSubmitBtn').textContent = "發布攻略";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        // 啟動即時資料監聽
        initPostsListener();
    </script>
</body>
</html>
