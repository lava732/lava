<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerGuide | 會員攻略發布系統 (含影片功能)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; }
        header { background-color: #1f1f1f; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ffcc00; }
        h1 { color: #ffcc00; margin: 0; font-size: 24px; }
        
        /* 登入狀態按鈕 */
        .auth-panel { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffcc00; display: none; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .login-btn { background-color: #4285F4; color: white; }
        .logout-btn { background-color: #d9534f; color: white; display: none; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        /* 發文表單 */
        .post-box { background-color: #1f1f1f; padding: 25px; border-radius: 8px; margin-bottom: 40px; display: none; }
        .login-reminder { background-color: #222; text-align: center; padding: 30px; border-radius: 8px; border: 1px dashed #ffcc00; color: #aaa; margin-bottom: 40px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; box-sizing: border-box; background-color: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .submit-btn { background-color: #ffcc00; color: #121212; font-size: 16px; font-weight: bold; width: 100%; }

        /* 進度條樣式 */
        .progress-container { display: none; margin: 10px 0; background-color: #333; border-radius: 4px; overflow: hidden; }
        .progress-bar { width: 0%; height: 10px; background-color: #ffcc00; transition: width 0.2s ease; }

        /* 文章列表 */
        .guide-post { background-color: #1f1f1f; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; border-left: 4px solid #ffcc00; }
        .guide-post h3 { margin: 0 0 10px 0; color: #fff; }
        .meta { font-size: 13px; color: #888; margin-bottom: 15px; }
        .meta span { margin-right: 15px; background: #333; padding: 3px 8px; border-radius: 4px; }
        .post-content { white-space: pre-wrap; margin-bottom: 20px; }
        
        /* 影片播放器 */
        .post-video { width: 100%; max-height: 400px; border-radius: 6px; background: #000; margin-bottom: 20px; display: block; }

        /* 功能按鈕組 */
        .action-group { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .edit-btn { background-color: #5cb85c; color: white; display: none; }
        .delete-btn { background-color: #d9534f; color: white; display: none; }
    </style>
</head>
<body>

    <header>
        <h1>GamerGuide 玩家創作區</h1>
        <div class="auth-panel">
            <img id="userAvatar" class="user-avatar" src="" alt="頭像">
            <span id="userName" style="display:none;"></span>
            <button id="loginBtn" class="btn login-btn">使用 Google 登入</button>
            <button id="logoutBtn" class="btn logout-btn">登出</button>
        </div>
    </header>

    <div class="container">
        <!-- 未登入提示 -->
        <div id="loginReminder" class="login-reminder">
            <h3>請先登入 Google 帳號，即可發表攻略與上傳影片！</h3>
        </div>

        <!-- 撰寫攻略表單 -->
        <section id="postBox" class="post-box">
            <h2 id="formTitle">📝 撰寫新攻略</h2>
            <form id="guideForm">
                <input type="hidden" id="editingPostId"> 
                <input type="hidden" id="existingVideoUrl"> <!-- 儲存編輯時原本的影片網址 -->
                
                <div class="form-group">
                    <label for="gameName">遊戲名稱：</label>
                    <input type="text" id="gameName" required>
                </div>
                <div class="form-group">
                    <label for="title">攻略標題：</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="content">攻略內容：</label>
                    <textarea id="content" required></textarea>
                </div>
                
                <!-- 新增：影片上傳欄位 -->
                <div class="form-group">
                    <label for="videoFile">上傳攻略影片 (選填，支援 mp4, webm)：</label>
                    <input type="file" id="videoFile" accept="video/*">
                    <small id="videoHint" style="color: #888; display: block; margin-top: 5px;">* 重新上傳將會覆蓋原有影片</small>
                </div>

                <!-- 進度條 -->
                <div id="progressContainer" class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <button type="submit" id="formSubmitBtn" class="btn submit-btn">發布攻略</button>
                <button type="button" id="cancelEditBtn" class="btn" style="background:#555; color:#fff; width:100%; margin-top:10px; display:none;">取消編輯</button>
            </form>
        </section>

        <!-- 最新攻略展示區 -->
        <section class="article-feed">
            <h2>🔥 最新玩家攻略</h2>
            <div id="postsContainer"><!-- 資料庫內容會動態塞在這裡 --></div>
        </section>
    </div>

    <!-- 載入 Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // 建議改用 signInWithRedirect 避免彈窗被攔截
        import { getAuth, signInWithRedirect, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        // 引入 Firebase Storage 模組
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC1f_sypRrrpUKym4VdySlriFb_WGP64s0",
            authDomain: "project-78ab8.firebaseapp.com",
            projectId: "project-78ab8",
            storageBucket: "project-78ab8.firebasestorage.app",
            messagingSenderId: "385214699225",
            appId: "1:385214699225:web:2150c4809616e6321490c8",
            measurementId: "G-62ZWJ9JLJD"
        };

        // 初始化 Firebase 各項服務
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app); // 初始化 Storage
        const provider = new GoogleAuthProvider();

        let currentUser = null; 

        // === 1. 登入/登出邏輯 ===
        document.getElementById('loginBtn').addEventListener('click', () => signInWithRedirect(auth, provider));
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('loginReminder').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('userAvatar').src = user.photoURL;
                document.getElementById('userAvatar').style.display = 'block';
                document.getElementById('postBox').style.display = 'block';
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('loginReminder').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'none';
                document.getElementById('userAvatar').style.display = 'none';
                document.getElementById('postBox').style.display = 'none';
                resetForm();
            }
        });

        // 輔助函式：處理檔案上傳並回傳 Promise 網址
        function uploadVideoPromise(file) {
            return new Promise((resolve, reject) => {
                const uniqueName = Date.now() + "_" + file.name;
                const storageRef = ref(storage, `videos/${uniqueName}`);
                const uploadTask = uploadBytesResumable(storageRef, file);

                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                progressContainer.style.display = 'block';

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressBar.style.width = progress + '%';
                    }, 
                    (error) => {
                        progressContainer.style.display = 'none';
                        reject(error);
                    }, 
                    async () => {
                        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                        resolve(downloadURL);
                    }
                );
            });
        }

        // === 2. 發布或儲存編輯攻略 (整合影片上傳) ===
        const form = document.getElementById('guideForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return alert('請先登入！');

            const gameName = document.getElementById('gameName').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const editingId = document.getElementById('editingPostId').value;
            const existingVideoUrl = document.getElementById('existingVideoUrl').value;
            const videoFile = document.getElementById('videoFile').files[0];

            document.getElementById('formSubmitBtn').disabled = true;
            document.getElementById('formSubmitBtn').textContent = "處理中，請稍候...";

            try {
                let videoUrl = existingVideoUrl || null;

                // 如果使用者有選擇新影片，執行上傳
                if (videoFile) {
                    videoUrl = await uploadVideoPromise(videoFile);
                }

                if (editingId) {
                    // 編輯模式
                    const postRef = doc(db, "guides", editingId);
                    await updateDoc(postRef, { gameName, title, content, videoUrl });
                    alert('📝 攻略修改成功！');
                    resetForm();
                } else {
                    // 新增模式
                    await addDoc(collection(db, "guides"), {
                        gameName, title, content, videoUrl,
                        userId: currentUser.uid, 
                        author: currentUser.displayName,
                        timestamp: new Date()
                    });
                    alert('🎉 攻略發表成功！');
                    resetForm();
                }
            } catch (error) {
                console.error(error);
                alert('操作失敗，檔案可能過大或權限不足。');
            } finally {
                document.getElementById('formSubmitBtn').disabled = false;
                document.getElementById('formSubmitBtn').textContent = editingId ? "儲存修改" : "發布攻略";
            }
        });

        // === 3. 即時同步下載雲端資料庫文章 ===
        function initPostsListener() {
            const q = query(collection(db, "guides"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const postsContainer = document.getElementById('postsContainer');
                postsContainer.innerHTML = ''; 

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const postId = doc.id;
                    
                    const postEl = document.createElement('article');
                    postEl.classList.add('guide-post');
                    
                    const showBtn = currentUser && currentUser.uid === data.userId ? 'inline-block' : 'none';

                    // 判斷是否有影片網址，有的話渲染 video 標籤
                    const videoHtml = data.videoUrl ? 
                        `<video class="post-video" src="${data.videoUrl}" controls preload="metadata"></video>` : '';

                    postEl.innerHTML = `
                        <h3>${data.title}</h3>
                        <div class="meta">
                            <span>遊戲：${data.gameName}</span> 
                            <span>作者：${data.author}</span> 
                        </div>
                        <p class="post-content">${data.content}</p>
                        ${videoHtml}
                        <div class="action-group">
                            <button class="btn edit-btn" style="display:${showBtn}" data-id="${postId}">編輯</button>
                            <button class="btn delete-btn" style="display:${showBtn}" data-id="${postId}">刪除</button>
                        </div>
                    `;
                    postsContainer.appendChild(postEl);
                });

                // 綁定編輯與刪除事件
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => startEdit(e.target.getAttribute('data-id')));
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => handleDelete(e.target.getAttribute('data-id')));
                });
            });
        }

        // === 4. 編輯與刪除細節控制 ===
        function startEdit(id) {
            const btn = document.querySelector(`.edit-btn[data-id="${id}"]`);
            const post = btn.closest('.guide-post');
            const videoEl = post.querySelector('.post-video');
            
            document.getElementById('gameName').value = post.querySelector('.meta span:nth-child(1)').textContent.replace('遊戲：', '');
            document.getElementById('title').value = post.querySelector('h3').textContent;
            document.getElementById('content').value = post.querySelector('.post-content').textContent;
            
            // 記錄原本是否存在影片
            document.getElementById('existingVideoUrl').value = videoEl ? videoEl.src : '';
            document.getElementById('videoHint').style.display = videoEl ? 'block' : 'none';

            document.getElementById('editingPostId').value = id;
            document.getElementById('formTitle').textContent = "✏️ 編輯我的攻略";
            document.getElementById('formSubmitBtn').textContent = "儲存修改";
            document.getElementById('cancelEditBtn').style.display = "block";
            
            window.scrollTo({ top: document.getElementById('postBox').offsetTop, behavior: 'smooth' });
        }

        async function handleDelete(id) {
            if (confirm('確定要刪除這篇攻略嗎？連同影片也將一併刪除且無法復原。')) {
                try {
                    // 先取得該文件以確認有無影片需要從 Storage 砍掉
                    const postsContainer = document.getElementById('postsContainer');
                    const btn = document.querySelector(`.delete-btn[data-id="${id}"]`);
                    const post = btn.closest('.guide-post');
                    const videoEl = post.querySelector('.post-video');

                    // 如果有影片，先刪除雲端檔案
                    if (videoEl && videoEl.src && !videoEl.src.includes(window.location.host)) {
                        try {
                            const fileRef = ref(storage, videoEl.src);
                            await deleteObject(fileRef);
                        } catch(e) { console.warn("Storage 檔案刪除失敗或已被清除", e); }
                    }

                    // 再刪除 Firestore 文件
                    await deleteDoc(doc(db, "guides", id));
                    alert('🗑️ 攻略及影片已成功刪除！');
                    
                    if(document.getElementById('editingPostId').value === id) {
                        resetForm();
                    }
                } catch (error) {
                    console.error(error);
                    alert('刪除失敗，請確認您的權限。');
                }
            }
        }

        document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

        function resetForm() {
            form.reset();
            document.getElementById('editingPostId').value = '';
            document.getElementById('existingVideoUrl').value = '';
            document.getElementById('formTitle').textContent = "📝 撰寫新攻略";
            document.getElementById('formSubmitBtn').textContent = "發布攻略";
            document.getElementById('cancelEditBtn').style.display = "none";
            document.getElementById('videoHint').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'none';
        }

        initPostsListener();
    </script>
</body>
</html>
