<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>發布遊戲攻略 | GamerGuide</title>
    <style>
        /* 基礎暗黑風格樣式 */
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; }
        header { background-color: #1f1f1f; padding: 15px 20px; text-align: center; border-bottom: 3px solid #ffcc00; }
        h1 { color: #ffcc00; margin: 0; }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        /* 發文表單區塊 */
        .post-box { background-color: #1f1f1f; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 40px; }
        .post-box h2 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: #fff; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        .form-group input[type="text"], .form-group textarea { 
            width: 100%; padding: 10px; box-sizing: border-box; 
            background-color: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; 
            font-family: inherit;
        }
        /* 針對檔案上傳按鈕的簡易美化 */
        .form-group input[type="file"] {
            color: #ccc;
            padding: 5px 0;
        }
        .form-group input[type="text"]:focus, .form-group textarea:focus { outline: none; border-color: #ffcc00; }
        .form-group textarea { resize: vertical; min-height: 150px; }
        
        button.submit-btn { 
            background-color: #ffcc00; color: #121212; font-size: 16px; font-weight: bold; 
            padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; width: 100%;
        }
        button.submit-btn:hover { background-color: #e6b800; }

        /* 文章列表區塊 */
        .article-feed h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; display: inline-block; }
        .guide-post { background-color: #1f1f1f; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #ffcc00; }
        .guide-post h3 { margin: 0 0 10px 0; color: #fff; font-size: 22px; }
        .guide-post .meta { font-size: 14px; color: #888; margin-bottom: 15px; }
        .guide-post .meta span { margin-right: 15px; background: #333; padding: 3px 8px; border-radius: 4px; color: #ddd;}
        .guide-post p { line-height: 1.6; white-space: pre-wrap; }
        
        /* 影片播放器樣式 */
        .video-container { margin-top: 15px; }
        .video-container video { width: 100%; border-radius: 8px; border: 1px solid #444; outline: none; background: #000; }
    </style>
</head>
<body>

    <header>
        <h1>GamerGuide 玩家創作區</h1>
    </header>

    <div class="container">
        <!-- 撰寫攻略表單 -->
        <section class="post-box">
            <h2>📝 撰寫新攻略</h2>
            <form id="guideForm">
                <div class="form-group">
                    <label for="gameName">遊戲名稱：</label>
                    <input type="text" id="gameName" placeholder="例如：薩爾達傳說 曠野之息" required>
                </div>
                <div class="form-group">
                    <label for="title">攻略標題：</label>
                    <input type="text" id="title" placeholder="請輸入吸睛的標題..." required>
                </div>
                <div class="form-group">
                    <label for="author">作者暱稱：</label>
                    <input type="text" id="author" placeholder="你的大名 (選填)">
                </div>
                
                <!-- 新增：影片上傳區塊 -->
                <div class="form-group">
                    <label for="videoUpload">🎬 上傳實戰影片 (選填)：</label>
                    <!-- accept="video/*" 限制使用者只能選擇影片檔案 -->
                    <input type="file" id="videoUpload" accept="video/*">
                </div>

                <div class="form-group">
                    <label for="content">攻略內容：</label>
                    <textarea id="content" placeholder="在這裡分享你的神級打法或通關密技..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">發布攻略</button>
            </form>
        </section>

        <!-- 最新攻略展示區 -->
        <section class="article-feed">
            <h2>🔥 最新玩家攻略</h2>
            <div id="postsContainer">
                <!-- 預設第一篇文章 -->
                <article class="guide-post">
                    <h3>【範例】如何無傷擊敗新手村大魔王？</h3>
                    <div class="meta">
                        <span>遊戲：新手村大冒險</span> 
                        <span>作者：系統管理員</span> 
                        <span>時間：剛剛</span>
                    </div>
                    <p>這是一篇範例文章。你可以試著在上方的表單填寫內容，並上傳一段短影片，看看會發生什麼事！</p>
                </article>
            </div>
        </section>
    </div>

    <script>
        const form = document.getElementById('guideForm');
        const postsContainer = document.getElementById('postsContainer');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            // 1. 獲取文字資料
            const gameName = document.getElementById('gameName').value;
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value || '匿名玩家';
            const content = document.getElementById('content').value;
            
            // 2. 處理影片檔案
            const videoFile = document.getElementById('videoUpload').files[0];
            let videoHTML = ''; // 預設沒有影片

            // 如果使用者有選擇影片檔案
            if (videoFile) {
                // 使用 URL.createObjectURL 產生一個能在瀏覽器預覽的暫存網址
                const videoURL = URL.createObjectURL(videoFile);
                videoHTML = `
                    <div class="video-container">
                        <!-- controls 屬性會顯示播放、暫停、音量等控制列 -->
                        <video controls>
                            <source src="${videoURL}" type="${videoFile.type}">
                            您的瀏覽器不支援影片標籤。
                        </video>
                    </div>
                `;
            }
            
            // 取得當前時間
            const now = new Date();
            const timeString = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

            // 3. 建立新的文章 HTML 結構
            const newPost = document.createElement('article');
            newPost.classList.add('guide-post');
            
            // 將影片 HTML (videoHTML) 接在內文下方
            newPost.innerHTML = `
                <h3>${title}</h3>
                <div class="meta">
                    <span>遊戲：${gameName}</span> 
                    <span>作者：${author}</span> 
                    <span>時間：${timeString}</span>
                </div>
                <p>${content}</p>
                ${videoHTML}
            `;

            // 4. 將新文章插入到列表的最上方
            postsContainer.prepend(newPost);

            // 5. 清空表單
            form.reset();
            alert('🎉 攻略發布成功！');
        });
    </script>

</body>

</html>
